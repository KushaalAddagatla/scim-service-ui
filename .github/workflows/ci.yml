name: CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION:           ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:         ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY_UI:    ${{ secrets.ECR_REPOSITORY_UI }}
  ECS_CLUSTER:          ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE_UI:       ${{ secrets.ECS_SERVICE_UI }}
  ECS_TASK_DEF_NAME_UI: ${{ secrets.ECS_TASK_DEF_NAME_UI }}
  CONTAINER_NAME_UI:    ${{ secrets.CONTAINER_NAME_UI }}

# ── Job 1: TypeScript check + Vite build ─────────────────────────────────────

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # VITE_API_BASE_URL is empty — same-origin ALB routing means the API
      # lives at the same host as the frontend. Vite needs the value at build
      # time; empty string tells axios to use relative paths (/scim/v2/...).
      - name: Type-check & build
        run: npm run build
        env:
          VITE_API_BASE_URL: ""

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

# ── Job 2: Build image and deploy to ECS ─────────────────────────────────────

  deploy:
    name: Docker → ECR → ECS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY_UI}:${{ github.sha }}"
          docker build --build-arg VITE_API_BASE_URL="" -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEF_NAME_UI}" \
            --query taskDefinition \
            > task-definition.json

      - name: Inject new image into task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME_UI }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE_UI }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
